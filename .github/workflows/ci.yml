name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Refresh the lockfile for a release PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          startsWith(github.head_ref, 'release-please--branches--main')
        run: uv lock

      - name: Check the lockfile
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name != github.repository ||
          !startsWith(github.head_ref, 'release-please--branches--main')
        run: uv lock --check

      - name: Synchronize the project
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check

      - name: Build application distribution
        run: uv build

      - name: Test
        run: >-
          uv run pytest
          --cov=lyra_app
          --cov=lyra
          --cov-report=term-missing
          --cov-report=xml

  documentation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install documentation dependencies
        run: npm ci
        working-directory: docs

      - name: Validate documentation content and types
        run: npm run check
        working-directory: docs

      - name: Build documentation
        run: npm run build
        working-directory: docs

      - name: Check internal documentation links
        run: npm run check:links
        working-directory: docs
