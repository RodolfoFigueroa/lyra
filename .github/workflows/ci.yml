name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Refresh the lockfile for a release PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          startsWith(github.head_ref, 'release-please--branches--main')
        run: uv lock

      - name: Check the lockfile
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name != github.repository ||
          !startsWith(github.head_ref, 'release-please--branches--main')
        run: uv lock --check

      - name: Synchronize the project
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check

      - name: Validate release metadata
        run: uv run python -m build_scripts.release validate

      - name: Build every package
        run: uv build --all-packages --out-dir "${RUNNER_TEMP}/lyra-dist"

      - name: Smoke test the built distributions
        run: |
          mkdir -p "${RUNNER_TEMP}/lyra-ci-smoke"
          cd "${RUNNER_TEMP}/lyra-ci-smoke"
          uv init --bare
          uv add "${RUNNER_TEMP}"/lyra-dist/*.whl
          uv run python -c "import lyra.sdk; import lyra.api; import lyra.utils; import lyra.tui; import lyra_app"
          uv run lyra-plugin --help
          uv run lyra-client --help
          uv run lyra-tui --help

      - name: Test
        run: >-
          uv run pytest
          --cov=lyra_app
          --cov=lyra
          --cov-report=term-missing
          --cov-report=xml

  documentation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install documentation dependencies
        run: npm ci
        working-directory: docs

      - name: Validate documentation content and types
        run: npm run check
        working-directory: docs

      - name: Build documentation
        run: npm run build
        working-directory: docs

      - name: Check internal documentation links
        run: npm run check:links
        working-directory: docs
