name: Build and Push Docker Image

on:
  push:
    branches:
      - dev
    paths-ignore:
      - "docs/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.11"

      # Validates SDK generation, linting, and formatting all at once.
      # Fails immediately if any file is modified or out of sync.
      - name: Enforce SDK Sync & Formatting
        run: uv run pre-commit run --all-files

  build-and-push:
    needs: validate
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      distribute: true
      runner: |
        default=ubuntu-24.04
        linux/arm64=ubuntu-24.04-arm
      cache: true
      cache-mode: max
      cache-scope: lyra-app
      sign: "false"
      meta-images: ghcr.io/${{ github.repository_owner }}/lyra
      meta-tags: type=raw,value=dev
      set-meta-labels: true
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
