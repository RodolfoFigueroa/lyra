name: Deploy versioned documentation

on:
  push:
    branches:
      - dev
    tags:
      - "lyra-app-v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the complete repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Assemble stable, development, and archived documentation
        shell: bash
        run: |
          dev_ref=HEAD
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            dev_ref=origin/dev
          fi
          uv run --frozen --group dev python -m docs.scripts.versioned_site \
            --output docs-site \
            --dev-ref "$dev_ref"

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
