name: Deploy versioned documentation

on:
  push:
    branches:
      - dev
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name != 'release' ||
      startsWith(github.event.release.tag_name, 'lyra-v')
    runs-on: ubuntu-latest

    steps:
      - name: Check out the complete repository history
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Assemble stable, development, and archived documentation
        shell: bash
        run: |
          dev_ref=HEAD
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            dev_ref=origin/dev
          fi
          uv run --frozen --group dev python -m docs.scripts.versioned_site \
            --output docs-site \
            --dev-ref "$dev_ref"

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: docs-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
