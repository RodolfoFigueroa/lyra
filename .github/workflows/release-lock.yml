name: Refresh Release Lockfile

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: release-lock-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  refresh:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.head_ref, 'release-please--branches--main')
    runs-on: ubuntu-latest

    steps:
      - name: Check out the release PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Refresh the workspace lockfile
        run: uv lock

      - name: Commit an updated lockfile
        env:
          RELEASE_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet -- uv.lock; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git commit -m "chore: refresh uv lockfile"
          git push origin "HEAD:${RELEASE_BRANCH}"
