name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Create or update the aggregate release PR
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
