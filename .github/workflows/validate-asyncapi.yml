name: Validate AsyncAPI

on:
  workflow_dispatch:
  push:
    paths:
      - docs/asyncapi.yaml
  pull_request:
    paths:
      - docs/asyncapi.yaml

jobs:
  validate-asyncapi:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate asyncapi.yaml
        run: npx -y @asyncapi/cli@latest validate docs/asyncapi.yaml
