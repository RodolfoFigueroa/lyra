repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.10
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix-only]
      # Run the formatter.
      - id: ruff-format

  - repo: local
    hooks:
      - id: generate-sdk-interface
        name: Generate SDK Interface
        entry: python build_sdk.py
        language: system
        files: ^lyra_app/db/client\.py$
        pass_filenames: false
