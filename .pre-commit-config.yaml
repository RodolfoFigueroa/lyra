repos:
  - repo: local
    hooks:
      - id: generate-sdk-interface
        name: Generate SDK Interface
        entry: uv run python build_scripts/generate_sdk.py
        language: system
        files: ^lyra_app/db/client\.py$
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.10
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix-only]
        exclude: ^packages/lyra_sdk/src/lyra/sdk/db\.py$
      # Run the formatter.
      - id: ruff-format
        exclude: ^packages/lyra_sdk/src/lyra/sdk/db\.py$
