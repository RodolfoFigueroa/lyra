repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.18
    hooks:
      - id: uv-lock

  - repo: local
    hooks:
      - id: generate-sdk-interface
        name: Generate SDK Interface
        entry: uv run python build_scripts/generate_sdk.py
        language: system
        files: ^lyra_app/db/client\.py$
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: [--fix-only]        
      - id: ruff-format
