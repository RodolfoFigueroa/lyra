# Copy this file to /lyra_data/config/lyra.toml and adjust values for your
# deployment. PostgreSQL connection settings plus the separate admin and agent
# API keys are supplied through environment variables, not this TOML file.
# LYRA_AGENT_API_KEY authenticates MCP and every /jobs lifecycle route.

schema_version = 1

[api]
host = "0.0.0.0"
port = 5219
# Agents use this operator-controlled URL for authenticated result downloads.
# Production deployments must use HTTPS. Explicit loopback HTTP is accepted for
# local development, for example http://127.0.0.1:5219.
public_base_url = "https://lyra.example.com"
# Trust forwarded scheme/client headers only from these reverse-proxy source
# IPs or CIDRs. Keep the loopback default for a host-local proxy; use the exact
# container-network CIDR when the proxy runs in another container.
forwarded_allow_ips = ["127.0.0.1"]

[redis]
# For docker/docker-compose-dev.yml, use lyra-redis-dev.
# For a production Compose service named lyra-redis, use redis://lyra-redis:6379/0.
# For direct local processes, use redis://localhost:6379/0.
url = "redis://lyra-redis:6379/0"

[earth_engine]
project = "your-gee-project-id"
# Not needed for docker deployments, which use the service account file 
# mounted at /lyra_data/secrets/service-account.json.
# service_account_file = "/lyra_data/secrets/service-account.json"

[logging]
level = "INFO"
# Set if you want logs written to a file instead of stdout.
# file = "/lyra_data/logs/lyra.log"

[job_store]
ttl_seconds = 600

[agent_submission_limit]
# New REST and MCP jobs share this fixed-window quota. Idempotent replays do not
# consume capacity.
limit = 10
window_seconds = 60

[mcp]
enabled = true
mount_path = "/mcp"

[plugins]
default_queue = "interactive"
allowed_queues = ["interactive", "batch"]
# Applied only when /lyra_data/state/plugins.toml does not exist. IDs are
# generated from each source and all initial repositories are enabled.
# initial_repos = ["owner/plugin-repo@main"]
# catalog_dir = "/lyra_data/plugins/catalog"
# runner_base_dir = "/lyra_data/plugins/runners"

[workers.interactive]
queues = ["interactive"]
concurrency = 4
# install_dir = "/lyra_data/plugins/runners/interactive"
# temp_dir = "/lyra_data/cache/jobs/interactive"

[workers.batch]
queues = ["batch"]
concurrency = 2
# install_dir = "/lyra_data/plugins/runners/batch"
# temp_dir = "/lyra_data/cache/jobs/batch"
