services:
  lyra-dev:
    image: lyra-dev:latest
    container_name: lyra-dev
    restart: unless-stopped
    ports:
      - 5219:5219
    volumes:
      - lyra_data:/lyra_data
    networks:
      - lyra_net
    depends_on:
      - lyra-redis-dev
    build: ..
    develop:
      watch:
        - action: sync+restart
          path: ..
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - .venv/
            - venv/
            - "*.env"
            - "*.ipynb"

  lyra-redis-dev:
    image: redis:alpine
    container_name: lyra-redis-dev
    restart: unless-stopped
    networks:
      - lyra_net

  lyra-celery-worker-interactive-dev:
    image: lyra-dev:latest
    container_name: lyra-celery-worker-interactive-dev
    restart: unless-stopped
    command: python -m lyra_app.worker_launcher interactive
    volumes:
      - lyra_data:/lyra_data
    networks:
      - lyra_net
    depends_on:
      - lyra-redis-dev
      - lyra-dev
    build: ..
    develop:
      watch:
        - action: sync+restart
          path: ..
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - .venv/
            - venv/
            - "*.env"
            - "*.ipynb"

  lyra-celery-worker-batch-dev:
    image: lyra-dev:latest
    container_name: lyra-celery-worker-batch-dev
    restart: unless-stopped
    command: python -m lyra_app.worker_launcher batch
    volumes:
      - lyra_data:/lyra_data
    networks:
      - lyra_net
    depends_on:
      - lyra-redis-dev
      - lyra-dev
    build: ..
    develop:
      watch:
        - action: sync+restart
          path: ..
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - .venv/
            - venv/
            - "*.env"
            - "*.ipynb"

networks:
  lyra_net:
    name: lyra_net
    driver: bridge

volumes:
  lyra_data:
    name: lyra_data
