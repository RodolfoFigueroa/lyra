x-lyra-app-volumes: &lyra-app-volumes
  - lyra_data:/lyra_data
  - ${LYRA_CONFIG_FILE}:/lyra_data/config/lyra.toml:ro
  - ${LYRA_SERVICE_ACCOUNT_FILE}:/lyra_data/secrets/service-account.json:ro

x-lyra-app-environment: &lyra-app-environment
  LYRA_POSTGRES_HOST: ${LYRA_POSTGRES_HOST}
  LYRA_POSTGRES_PORT: ${LYRA_POSTGRES_PORT}
  LYRA_POSTGRES_DB: ${LYRA_POSTGRES_DB}
  LYRA_POSTGRES_USER: ${LYRA_POSTGRES_USER}
  LYRA_POSTGRES_PASSWORD: ${LYRA_POSTGRES_PASSWORD}
  LYRA_ADMIN_API_KEY: ${LYRA_ADMIN_API_KEY}
  LYRA_AGENT_API_KEY: ${LYRA_AGENT_API_KEY}

services:
  lyra-dev:
    image: lyra-dev:latest
    container_name: lyra-dev
    restart: unless-stopped
    ports:
      - 5219:5219
    volumes: *lyra-app-volumes
    environment: *lyra-app-environment
    networks:
      - lyra_net
    depends_on:
      - lyra-redis-dev
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:5219/ready', timeout=2).read()"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    build: ..
    develop:
      watch:
        - action: sync+restart
          path: ..
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - .venv/
            - venv/
            - "*.env"
            - "*.ipynb"

  lyra-redis-dev:
    image: redis:alpine
    container_name: lyra-redis-dev
    restart: unless-stopped
    networks:
      - lyra_net

  lyra-celery-worker-interactive-dev:
    image: lyra-dev:latest
    container_name: lyra-celery-worker-interactive-dev
    restart: unless-stopped
    command: python -m lyra_app.worker_launcher interactive
    volumes: *lyra-app-volumes
    environment: *lyra-app-environment
    networks:
      - lyra_net
    depends_on:
      lyra-redis-dev:
        condition: service_started
      lyra-dev:
        condition: service_healthy
    build: ..
    develop:
      watch:
        - action: sync+restart
          path: ..
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - .venv/
            - venv/
            - "*.env"
            - "*.ipynb"

  lyra-celery-worker-batch-dev:
    image: lyra-dev:latest
    container_name: lyra-celery-worker-batch-dev
    restart: unless-stopped
    command: python -m lyra_app.worker_launcher batch
    volumes: *lyra-app-volumes
    environment: *lyra-app-environment
    networks:
      - lyra_net
    depends_on:
      lyra-redis-dev:
        condition: service_started
      lyra-dev:
        condition: service_healthy
    build: ..
    develop:
      watch:
        - action: sync+restart
          path: ..
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - .venv/
            - venv/
            - "*.env"
            - "*.ipynb"

networks:
  lyra_net:
    name: lyra_net
    driver: bridge

volumes:
  lyra_data:
    name: lyra_data
