services:
  lyra-dev:
    image: lyra-dev:latest
    container_name: lyra-dev
    restart: unless-stopped
    ports:
      - 5219:5219
    volumes:
      - ${SERVICE_ACCOUNT_BIND_PATH}:/app/service-account.json:ro
      - ${LYRA_CACHE_BIND_PATH}:/lyra_cache
      - lyra_plugin_catalog:/lyra_plugin_catalog
    networks:
      - lyra_net
    environment:
      CELERY_BROKER_URL: redis://lyra-redis-dev:6379/0
    env_file:
      - ../.env
    build: ..
    develop:
      watch:
        - action: sync+restart
          path: ..
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - .venv/
            - venv/
            - "*.env"
            - "*.ipynb"

  lyra-redis-dev:
    image: redis:alpine
    container_name: lyra-redis-dev
    restart: unless-stopped
    networks:
      - lyra_net

  lyra-celery-worker-interactive-dev:
    image: lyra-dev:latest
    container_name: lyra-celery-worker-interactive-dev
    restart: unless-stopped
    command: celery -A lyra_app.worker.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-32} -Q interactive
    environment:
      LYRA_RUNNER_QUEUES: interactive
      CELERY_BROKER_URL: redis://lyra-redis-dev:6379/0
    volumes:
      - ${SERVICE_ACCOUNT_BIND_PATH}:/app/service-account.json:ro
      - ${LYRA_CACHE_BIND_PATH}:/lyra_cache
      - lyra_plugins_interactive:/lyra_plugins
    networks:
      - lyra_net
    depends_on:
      - lyra-redis-dev
      - lyra-dev
    env_file:
      - ../.env
    build: ..
    develop:
      watch:
        - action: sync+restart
          path: ..
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - .venv/
            - venv/
            - "*.env"
            - "*.ipynb"

  lyra-celery-worker-batch-dev:
    image: lyra-dev:latest
    container_name: lyra-celery-worker-batch-dev
    restart: unless-stopped
    command: celery -A lyra_app.worker.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-32} -Q batch
    environment:
      LYRA_RUNNER_QUEUES: batch
      CELERY_BROKER_URL: redis://lyra-redis-dev:6379/0
    volumes:
      - ${SERVICE_ACCOUNT_BIND_PATH}:/app/service-account.json:ro
      - ${LYRA_CACHE_BIND_PATH}:/lyra_cache
      - lyra_plugins_batch:/lyra_plugins
    networks:
      - lyra_net
    depends_on:
      - lyra-redis-dev
      - lyra-dev
    env_file:
      - ../.env
    build: ..
    develop:
      watch:
        - action: sync+restart
          path: ..
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - .venv/
            - venv/
            - "*.env"
            - "*.ipynb"

networks:
  lyra_net:
    name: lyra_net
    driver: bridge

volumes:
  lyra_plugin_catalog:
    name: lyra_plugin_catalog
  lyra_plugins_interactive:
    name: lyra_plugins_interactive
  lyra_plugins_batch:
    name: lyra_plugins_batch
