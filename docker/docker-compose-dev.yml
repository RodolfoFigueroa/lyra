x-lyra-app-volumes: &lyra-app-volumes
  - lyra_data:/lyra_data
  - ${LYRA_CONFIG_FILE}:/lyra_data/config/lyra.toml:ro
  - ${LYRA_POSTGRES_PASSWORD_FILE}:/lyra_data/secrets/postgres_password:ro
  - ${LYRA_ADMIN_API_KEY_FILE}:/lyra_data/secrets/admin_api_key:ro
  - ${LYRA_SERVICE_ACCOUNT_FILE}:/lyra_data/secrets/service-account.json:ro

services:
  lyra-dev:
    image: lyra-dev:latest
    container_name: lyra-dev
    restart: unless-stopped
    ports:
      - 5219:5219
    volumes: *lyra-app-volumes
    networks:
      - lyra_net
    depends_on:
      - lyra-redis-dev
    build: ..
    develop:
      watch:
        - action: sync+restart
          path: ..
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - .venv/
            - venv/
            - "*.env"
            - "*.ipynb"

  lyra-redis-dev:
    image: redis:alpine
    container_name: lyra-redis-dev
    restart: unless-stopped
    networks:
      - lyra_net

  lyra-celery-worker-interactive-dev:
    image: lyra-dev:latest
    container_name: lyra-celery-worker-interactive-dev
    restart: unless-stopped
    command: python -m lyra_app.worker_launcher interactive
    volumes: *lyra-app-volumes
    networks:
      - lyra_net
    depends_on:
      - lyra-redis-dev
      - lyra-dev
    build: ..
    develop:
      watch:
        - action: sync+restart
          path: ..
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - .venv/
            - venv/
            - "*.env"
            - "*.ipynb"

  lyra-celery-worker-batch-dev:
    image: lyra-dev:latest
    container_name: lyra-celery-worker-batch-dev
    restart: unless-stopped
    command: python -m lyra_app.worker_launcher batch
    volumes: *lyra-app-volumes
    networks:
      - lyra_net
    depends_on:
      - lyra-redis-dev
      - lyra-dev
    build: ..
    develop:
      watch:
        - action: sync+restart
          path: ..
          target: /app
          ignore:
            - .git/
            - __pycache__/
            - .venv/
            - venv/
            - "*.env"
            - "*.ipynb"

networks:
  lyra_net:
    name: lyra_net
    driver: bridge

volumes:
  lyra_data:
    name: lyra_data
