services:
  lyra:
    image: rodolfofigueroa/lyra:latest
    restart: unless-stopped
    ports:
      - 5219:5219
    volumes:
      - ${SERVICE_ACCOUNT_BIND_PATH}:/app/service-account.json:ro
      - ${LYRA_CACHE_BIND_PATH}:/lyra_cache
      - lyra_plugin_catalog:/lyra_plugin_catalog
    networks:
      - lyra_net
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    env_file:
      - ../.env

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - lyra_net

  celery_worker_interactive:
    image: rodolfofigueroa/lyra:latest
    restart: unless-stopped
    command: celery -A lyra_app.worker.celery_app worker --loglevel=info -Q interactive
    environment:
      LYRA_RUNNER_QUEUES: interactive
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ${SERVICE_ACCOUNT_BIND_PATH}:/app/service-account.json:ro
      - ${LYRA_CACHE_BIND_PATH}:/lyra_cache
      - lyra_plugins_interactive:/lyra_plugins
    networks:
      - lyra_net
    depends_on:
      - redis
      - lyra
    env_file:
      - ../.env

  celery_worker_batch:
    image: rodolfofigueroa/lyra:latest
    restart: unless-stopped
    command: celery -A lyra_app.worker.celery_app worker --loglevel=info -Q batch
    environment:
      LYRA_RUNNER_QUEUES: batch
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - ${SERVICE_ACCOUNT_BIND_PATH}:/app/service-account.json:ro
      - ${LYRA_CACHE_BIND_PATH}:/lyra_cache
      - lyra_plugins_batch:/lyra_plugins
    networks:
      - lyra_net
    depends_on:
      - redis
      - lyra
    env_file:
      - ../.env


networks:
  lyra_net:
    name: lyra_net
    driver: bridge

volumes:
  lyra_plugin_catalog:
    name: lyra_plugin_catalog
  lyra_plugins_interactive:
    name: lyra_plugins_interactive
  lyra_plugins_batch:
    name: lyra_plugins_batch
