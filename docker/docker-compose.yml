services:
  lyra:
    image: rodolfofigueroa/lyra:latest
    restart: unless-stopped
    ports:
      - 5219:5219
    volumes:
      - lyra_data:/lyra_data
    networks:
      - lyra_net
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - lyra_net

  celery_worker_interactive:
    image: rodolfofigueroa/lyra:latest
    restart: unless-stopped
    command: python -m lyra_app.worker_launcher interactive
    volumes:
      - lyra_data:/lyra_data
    networks:
      - lyra_net
    depends_on:
      - redis
      - lyra

  celery_worker_batch:
    image: rodolfofigueroa/lyra:latest
    restart: unless-stopped
    command: python -m lyra_app.worker_launcher batch
    volumes:
      - lyra_data:/lyra_data
    networks:
      - lyra_net
    depends_on:
      - redis
      - lyra


networks:
  lyra_net:
    name: lyra_net
    driver: bridge

volumes:
  lyra_data:
    name: lyra_data
