services:
  lyra:
    image: rodolfofigueroa/lyra:latest
    restart: unless-stopped
    ports:
      - 5219:5219
    volumes:
      - ${SERVICE_ACCOUNT_BIND_PATH}:/app/service-account.json:ro
      - ${LYRA_CACHE_BIND_PATH}:/lyra_cache
      - lyra_plugin_catalog:/lyra_plugin_catalog
    networks:
      - lyra_net
    env_file: ".env"    

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - lyra_net

  celery_worker_lightweight:
    image: rodolfofigueroa/lyra:latest
    restart: unless-stopped
    command: celery -A lyra_app.worker.celery_app worker --loglevel=info -Q lightweight
    environment:
      LYRA_RUNNER_QUEUES: lightweight
    volumes:
      - ${SERVICE_ACCOUNT_BIND_PATH}:/app/service-account.json:ro
      - ${LYRA_CACHE_BIND_PATH}:/lyra_cache
      - lyra_plugins_lightweight:/lyra_plugins
    networks:
      - lyra_net
    depends_on:
      - redis
      - lyra
    env_file: ".env"

  celery_worker_earth_engine:
    image: rodolfofigueroa/lyra:latest
    restart: unless-stopped
    command: celery -A lyra_app.worker.celery_app worker --loglevel=info -Q earth_engine
    environment:
      LYRA_RUNNER_QUEUES: earth_engine
    volumes:
      - ${SERVICE_ACCOUNT_BIND_PATH}:/app/service-account.json:ro
      - ${LYRA_CACHE_BIND_PATH}:/lyra_cache
      - lyra_plugins_earth_engine:/lyra_plugins
    networks:
      - lyra_net
    depends_on:
      - redis
      - lyra
    env_file: ".env"

  celery_worker_heavy:
    image: rodolfofigueroa/lyra:latest
    restart: unless-stopped
    command: celery -A lyra_app.worker.celery_app worker --loglevel=info -Q heavy
    environment:
      LYRA_RUNNER_QUEUES: heavy
    volumes:
      - ${SERVICE_ACCOUNT_BIND_PATH}:/app/service-account.json:ro
      - ${LYRA_CACHE_BIND_PATH}:/lyra_cache
      - lyra_plugins_heavy:/lyra_plugins
    networks:
      - lyra_net
    depends_on:
      - redis
      - lyra
    env_file: ".env"


networks:
  lyra_net:
    name: lyra_net
    driver: bridge

volumes:
  lyra_plugin_catalog:
    name: lyra_plugin_catalog
  lyra_plugins_lightweight:
    name: lyra_plugins_lightweight
  lyra_plugins_earth_engine:
    name: lyra_plugins_earth_engine
  lyra_plugins_heavy:
    name: lyra_plugins_heavy
