[project]
name = "lyra-api"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "aiofiles>=24.1.0",
    "aiohttp>=3.13.5",
    "lyra-sdk",
    "pydantic>=2.13.4",
    "requests>=2.34.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lyra"]

[tool.uv.sources]
lyra-sdk = { workspace = true }
