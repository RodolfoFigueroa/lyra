[project]
name = "lyra-mcp"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = ["fastapi>=0.136.1", "mcp>=1,<2", "lyra-sdk"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lyra"]

[tool.uv.sources]
lyra-sdk = { workspace = true }
