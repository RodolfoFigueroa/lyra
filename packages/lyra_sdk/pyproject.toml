[project]
name = "lyra-sdk"
version = "0.9.0"
requires-python = ">=3.11"
dependencies = [
    "jsonschema>=4.26.0",
    "pydantic>=2.13.4",
    "ruamel-yaml>=0.19.1",
]

[project.scripts]
lyra-plugin = "lyra.sdk.plugin_cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lyra"]
