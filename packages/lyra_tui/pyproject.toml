[project]
name = "lyra-tui"
version = "0.5.0"
description = "Terminal operator console for running Lyra instances."
requires-python = ">=3.11"
dependencies = [
    "lyra-api>=0.6.0",
    "textual>=0.86.0",
]

[project.scripts]
lyra-tui = "lyra.tui.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lyra"]

[tool.uv.sources]
lyra-api = { workspace = true }
