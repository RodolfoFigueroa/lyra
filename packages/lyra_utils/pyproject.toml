[project]
name = "lyra-utils"
version = "0.2.0"
requires-python = ">=3.11"
dependencies = [
    "earthengine-api>=1.7.26",
    "geopandas>=1.1.3",
    "lyra-sdk",
    "networkx>=3.6.1",
    "osmnx>=2.1.0",
    "pandas>=2.3.3",
    "shapely>=2.1.2",
    "sqlalchemy>=2.0.49",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lyra"]

[tool.uv.sources]
lyra-sdk = { workspace = true }
