[project]
name = "lyra-utils"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "earthengine-api>=1.7.26",
    "geemap>=0.37.2",
    "geopandas>=1.1.3",
    "lyra-sdk",
    "pandana>=0.7",
    "pandas>=3.0.3",
    "shapely>=2.1.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lyra"]

[tool.uv.sources]
lyra-sdk = { workspace = true }
