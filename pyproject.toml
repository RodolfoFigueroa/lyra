[project]
name = "lyra"
version = "0.1.0"
description = "REST API for calculating mexican land use indicators."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
	"earthengine-api>=1.7.21",
	"fastapi>=0.115.12",
	"fiona>=1.10.1",
	"geedim>=2.0.0",
	"geemap>=0.37.2",
	"geopandas>=1.1.3",
	"numpy<2",
	"osmnx>=2.1.0",
	"pandana>=0.7",
	"pandas-stubs>=3.0.0.260204",
	"psycopg2>=2.9.11",
	"python-multipart>=0.0.20",
	"requests>=2.33.1",
	"sqlalchemy>=2.0.49",
	"types-geopandas>=1.1.3.20260408",
	"uvicorn>=0.34.2",
]


[project.scripts]
lyra-api = "lyra.app:main"

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lyra"]

[tool.pytest.ini_options]
pythonpath = ["src"]

[dependency-groups]
dev = [
    "ipykernel<7",
    "pre-commit>=4.5.1",
]
