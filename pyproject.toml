[project]
name = "lyra-app"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "celery>=5.6.3",
    "fastapi>=0.136.1",
    "redis>=7.4.0",
    "uvicorn>=0.46.0",
    "lyra-sdk",
]

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
lyra-sdk = { workspace = true }

[tool.ruff.lint]
select = ["ALL"]
ignore = ["D", "S104"]
