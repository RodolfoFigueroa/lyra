[project]
name = "lyra"
version = "0.1.0"
description = "REST API for calculating mexican land use indicators."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
	"asyncpg>=0.31.0",
	"celery>=5.6.3",
	"earthengine-api>=1.7.21",
	"fastapi>=0.115.12",
	"fiona>=1.10.1",
	"geedim>=2.0.0",
	"geemap>=0.37.2",
	"geopandas>=1.1.3",
	"numpy<2",
	"osmnx>=2.1.0",
	"pandana>=0.7",
	"pandas-stubs>=3.0.0.260204",
	"psycopg2>=2.9.11",
	"python-dateutil>=2.9.0.post0",
	"python-multipart>=0.0.20",
	"redis>=7.4.0",
	"requests>=2.33.1",
	"sqlalchemy[asyncio]>=2.0.49",
	"types-geopandas>=1.1.3.20260408",
	"uvicorn[standard]>=0.34.2",
	"websockets>=16.0",
]


[project.scripts]
lyra = "lyra.app:main"

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lyra"]

[tool.pytest.ini_options]
pythonpath = ["src"]

[dependency-groups]
dev = [
    "ipykernel<7",
    "lyra-api",
    "pre-commit>=4.5.1",
]

[tool.ruff.lint]
select = ["ALL"]
ignore = ["D", "PLR0913", "COM812", "ANN401", "PLR2004", "S104"]

[tool.uv.sources]
lyra-api = { git = "https://github.com/RodolfoFigueroa/lyra-api" }