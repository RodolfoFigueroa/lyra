schema_version = 6
roadmap_id = "lyra-agent-bridge-hardening"
overview = "00-overview.md"
prompt_budget_bytes = 30000
audit = "risk_based"

[final_validation]
file = "99-validation.md"
audit = "always"

[[final_validation.validation]]
id = "full-tests"
kind = "pytest-all"
required = true
runner_managed = true
timeout_seconds = 600

[[final_validation.validation]]
id = "ruff-check"
kind = "ruff-check"
targets = ["."]
required = true
runner_managed = true
timeout_seconds = 300

[[final_validation.validation]]
id = "ruff-format"
kind = "ruff-format"
targets = ["."]
required = true
runner_managed = true
timeout_seconds = 300

[[final_validation.validation]]
id = "type-check"
kind = "ty"
required = true
runner_managed = true
timeout_seconds = 300

[defaults]
model = "gpt-5.6-sol"
reasoning_effort = "high"
empty_diff = "fail"

