schema_version = 5
roadmap_id = "lyra-mcp-agent-bridge"
overview = "00-overview.md"
prompt_budget_bytes = 30000
audit = "risk_based"

[defaults]
model = "gpt-5.5"
reasoning_effort = "high"
empty_diff = "fail"

[final_validation]
file = "99-validation.md"
audit = "inherit"
prompt_context_paths = [
  "packages/lyra_sdk/src/lyra/sdk/models",
  "packages/lyra_api/src/lyra/api/client",
  "lyra_app",
  "packages/lyra_mcp",
  "tests",
  "docs/src/content/docs",
]

[[final_validation.validation]]
id = "roadmap-contract"
kind = "roadmap-lint"
targets = ["roadmap/lyra-mcp-agent-bridge"]
required = true
runner_managed = true
timeout_seconds = 120

[[final_validation.validation]]
id = "format-check"
kind = "ruff-format"
targets = ["."]
required = true
runner_managed = true
timeout_seconds = 120

[[final_validation.validation]]
id = "lint-check"
kind = "ruff-check"
targets = ["."]
required = true
runner_managed = true
timeout_seconds = 180

[[final_validation.validation]]
id = "type-check"
kind = "ty"
required = true
runner_managed = true
timeout_seconds = 180

[[final_validation.validation]]
id = "full-tests"
kind = "pytest-all"
required = true
runner_managed = true
timeout_seconds = 420

[steps."01-agent-metric-catalog-contract.md"]
